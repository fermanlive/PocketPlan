services:
  backend:
    build:
      context: ./backend
    container_name: pocketplan-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - password_mongo=${password_mongo}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # La URL debe ser accesible desde el navegador del usuario, no desde el contenedor.
        # Si accedes en local usa localhost; en producción cambia por tu dominio.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: pocketplan-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
